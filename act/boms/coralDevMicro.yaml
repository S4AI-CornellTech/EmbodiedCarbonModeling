name: Coral Dev Micro
description: Materials model for Google Coral Dev Micro,
  based on BoM CSV and IC datasheet information

silicon:
  # U5 - MIMXRT1176CVM8A ARM Cortex-M4/M7 processor, BGA-289, 14x14mm, 28nm
  # NXP uses TSMC for some products but foundry unconfirmed for this chip; die area estimated
  U5.MIMXRT1176CVM8A:
    area: 35.0 mm2      # estimated: dual-core crossover MCU at 28nm, ~2-3x RT1060 (~12mm2)
    process: 28nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U23 - TPU module (Edge TPU), 15x10mm, 16nm
  # Process node and foundry unconfirmed; die area estimated for a 2W inference accelerator
  U23.TPU:
    area: 30.0 mm2      
    process: 14nm   # proximate for 16nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U20 - PTN5150AHXMP USB-C Host Controller, X2QFN-12, 1.6x1.6mm
  # Simple CC logic chip; NXP datasheet does not disclose process, estimated 180nm BCD
  U20.PTN5150AHXMP:
    area: 1.285 mm2     # die size from IC table
    process: 180nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U17 - MT29F1G01ABBFDWB NAND Flash 1Gb, UDFN-8
  # Micron manufactures in own fabs (Idaho, Japan, Singapore)
  U17.MT29F1G01ABBFDWB:
    model: flash
    process: nand_30nm
    n_ics: 1
    capacity: 128 MB    # 1Gbit = 128MB

  # U18 - MT48H32M16LFB4 DRAM 512Mb, VFBGA-54
  # MT48H is first-gen Mobile LPDDR1 (~2009-2011 era); using ddr3_50nm as closest available key
  U18.MT48H32M16LFB4:
    model: dram
    process: ddr3_50nm
    n_ics: 1
    capacity: 64 MB     # 512Mbit = 64MB

  # U6 - A7101CHUK Security/Auth Microcontroller, WLCSP-12, 4x4mm, 28nm
  # Manufacturer/foundry unconfirmed
  U6.A7101CHUK:
    area: 5.044 mm2     # die size from IC table (4x4mm package, ratio ~0.315)
    process: 28nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U1 - DA9061 Power Management IC, 40QFN, 6x6mm
  # Dialog Semiconductor confirmed TSMC partnership for PMIC BCD process at 0.25um (250nm)
  # DA9061 is a PMIC likely on similar BCD node; using 180nm as closest available
  U1.DA9061:
    area: 18.072 mm2    # die size from IC table
    process: 180nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: taiwan

  # U22 - NCP170ASN180T2G LDO 1.8V, TSOP-5, 1x1mm
  # onsemi CMOS LDO; typical process for this family is 180nm, not 28nm
  U22.NCP170ASN180T2G:
    area: 0.698 mm2     # die size from IC table
    process: 180nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U2 - TCR2LN33 LDO 3.3V, SDFN-4, 0.8x0.8mm
  # Toshiba TCR-series CMOS LDO; typical process for this family is 180nm
  U2.TCR2LN33:
    area: 0.213 mm2     # die size from IC table
    process: 180nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U21 - SIP32408DNP High-side switch, TDFN-4, 1.2x1.6mm
  # Vishay high-side switch; typical BCD process estimated 180nm
  U21.SIP32408DNP:
    area: 0.640 mm2     # die size from IC table
    process: 180nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U4 - 74AXP1T34GMH Logic translator, XSON-6, 1x1.45mm
  # NXP small logic gate; simple translator likely 130nm not 28nm
  U4.74AXP1T34GMH:
    area: 1.013 mm2     # die size from IC table
    process: 130nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U3 - SN74LVC1G126DRYR Logic buffer, UFDFN-6, 1x1.45mm
  # TI small logic gate; simple buffer likely 130nm not 28nm
  U3.SN74LVC1G126DRYR:
    area: 0.483 mm2     # die size from IC table
    process: 130nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U10 - SPST switch logic, SOT833-1, 1x1.95mm
  # NXP small logic switch; estimated 130nm
  U10.SPST_SOT833:
    area: 1.362 mm2     # die size from IC table
    process: 130nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U13 - SPST switch logic, SOT833-1, 1x1.95mm
  # NXP small logic switch; estimated 130nm
  U13.SPST_SOT833:
    area: 1.362 mm2
    process: 130nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

  # U14 - SPST switch logic, SOT833-1, 1x1.95mm
  # NXP small logic switch; estimated 130nm
  U14.SPST_SOT833:
    area: 1.362 mm2
    process: 130nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: world

